name: CI

on:
    push:
        branches:
            - main
    pull_request:

permissions:
    contents: read

jobs:
    test:
        runs-on: ubuntu-latest
        timeout-minutes: 20

        steps:
            - name: Harden the runner (Audit all outbound calls)
              uses: step-security/harden-runner@5ef0c079ce82195b2a36a210272d6b661572d83e # v2.14.2
              with:
                  egress-policy: audit

            - name: Checkout
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            - name: Setup Node.js
              uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
              with:
                  node-version: 20.19.0
                  cache: npm

            - name: Install dependencies
              run: npm ci --force

            - name: Build package
              run: npm run build

            - name: Lint
              run: npm run lint

            - name: Typecheck
              run: npm run typecheck

            - name: Test
              run: npm test

    eslint9-compat:
        name: ESLint 9 Compatibility (${{ matrix.label }})
        runs-on: ubuntu-latest
        timeout-minutes: 20
        strategy:
            fail-fast: false
            matrix:
                include:
                    - eslint-js-version: 9.0.0
                      eslint-version: 9.0.0
                      label: 9.0.0
                    - eslint-js-version: ^9.39.1
                      eslint-version: ^9.39.1
                      label: 9.latest

        steps:
            - name: Harden the runner (Audit all outbound calls)
              uses: step-security/harden-runner@5ef0c079ce82195b2a36a210272d6b661572d83e # v2.14.2
              with:
                  egress-policy: audit

            - name: Checkout repository
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            - name: Setup Node.js
              uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
              with:
                  cache: npm
                  node-version: 20.19.0

            - name: Install dependencies
              run: npm ci --force

            - name: Build package
              run: npm run build

            - name: Install ESLint 9 runtime for compatibility smoke checks
              run: npm install --no-save --force eslint@${{ matrix.eslint-version }} @eslint/js@${{ matrix.eslint-js-version }}

            - name: Run ESLint 9 compatibility smoke checks
              run: npm run lint:compat:eslint9 -- --expect-eslint-major=9
