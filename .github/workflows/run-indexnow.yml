# Run IndexNow notifications manually
# yaml-language-server: $schema=https://www.schemastore.org/github-workflow.json
name: "Run Index Now Submission"

run-name: >-
    IndexNow • ${{ inputs.submission_mode }} • ${{ github.ref_name }} @${{ github.actor }}

on:
    workflow_dispatch:
        inputs:
            submission_mode:
                default: "delta"
                description: "Choose whether to submit only changed public URLs or replay the full deployed sitemap."
                options:
                    - "delta"
                    - "sitemap"
                required: true
                type: "choice"
            base_ref:
                default: "" # yamllint disable-line rule:empty-values
                description: "Optional older git ref/SHA for delta mode. Defaults to HEAD^."
                required: false
                type: "string"
            head_ref:
                default: "" # yamllint disable-line rule:empty-values
                description: "Optional newer git ref/SHA for delta mode. Defaults to HEAD."
                required: false
                type: "string"
            content_paths_json:
                default: "" # yamllint disable-line rule:empty-values
                description: "Optional JSON string array of repo-relative paths to constrain delta scanning."
                required: false
                type: "string"

concurrency:
    group: "indexnow-manual"
    cancel-in-progress: true

jobs:
    submit:
        name: "Submit IndexNow Notification"
        runs-on: "ubuntu-latest"
        timeout-minutes: 60
        permissions:
            contents: "read"
        defaults:
            run:
                shell: "bash"
        steps:
            - name: "Harden runner"
              uses: "step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920" # v2.20.0
              with:
                  egress-policy: "audit"

            - name: "Checkout repository"
              uses: "actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0" # v7.0.0
              with:
                  fetch-depth: 0

            - name: "Setup Node.js"
              env:
                  npm_config_force: "true"
              uses: "actions/setup-node@820762786026740c76f36085b0efc47a31fe5020" # v7.0.0
              with:
                  node-version-file: ".node-version"
                  cache: "npm"
                  cache-dependency-path: "package-lock.json"

            - name: "Install declared npm version"
              env:
                  npm_config_force: "true"
              run: |
                  package_manager="$(node -p "require('./package.json').packageManager")"
                  npm install --global "${package_manager}"
                  npm --version

            - name: "Install dependencies"
              run: "npm ci --force"

            - name: "Verify IndexNow secret"
              env:
                  INDEXNOW_KEY: "${{ secrets.INDEXNOW_KEY }}"
              run: |
                  if [ -z "${INDEXNOW_KEY}" ]; then
                    echo "::error title=Missing INDEXNOW_KEY::Set the INDEXNOW_KEY repository secret before running the manual IndexNow workflow."
                    exit 1
                  fi

            - name: "Build Docusaurus site for route manifest"
              if: "inputs.submission_mode == 'delta'"
              run: "npm run docs:build"

            - name: "Write IndexNow route manifest"
              if: "inputs.submission_mode == 'delta'"
              run: >-
                  node scripts/indexnow.mjs write-route-manifest --output temp/indexnow-route-manifest.json --site-directory docs/docusaurus

            - name: "Resolve delta refs"
              id: "delta_refs"
              if: "inputs.submission_mode == 'delta'"
              env:
                  INDEXNOW_INPUT_BASE_REF: "${{ inputs.base_ref }}"
                  INDEXNOW_INPUT_HEAD_REF: "${{ inputs.head_ref }}"
              run: |
                  HEAD_REF="${INDEXNOW_INPUT_HEAD_REF}"
                  if [ -z "${HEAD_REF}" ]; then
                    HEAD_REF="$(git rev-parse HEAD)"
                  fi

                  BASE_REF="${INDEXNOW_INPUT_BASE_REF}"
                  if [ -z "${BASE_REF}" ]; then
                    BASE_REF="$(git rev-parse "${HEAD_REF}^" 2>/dev/null || printf '0000000000000000000000000000000000000000')"
                  fi

                  echo "head_ref=${HEAD_REF}" >> "$GITHUB_OUTPUT"
                  echo "base_ref=${BASE_REF}" >> "$GITHUB_OUTPUT"

            - name: "Submit changed public URLs to IndexNow"
              if: "inputs.submission_mode == 'delta'"
              env:
                  INDEXNOW_BASE_REF: "${{ steps.delta_refs.outputs.base_ref }}"
                  INDEXNOW_CONTENT_PATHS_JSON: "${{ inputs.content_paths_json }}"
                  INDEXNOW_HEAD_REF: "${{ steps.delta_refs.outputs.head_ref }}"
                  INDEXNOW_KEY: "${{ secrets.INDEXNOW_KEY }}"
                  INDEXNOW_ROUTE_MANIFEST_PATH: "temp/indexnow-route-manifest.json"
                  INDEXNOW_SITE_DIRECTORY: "docs/docusaurus"
              run: "node scripts/indexnow.mjs submit-delta"

            - name: "Submit deployed sitemap URLs to IndexNow"
              if: "inputs.submission_mode == 'sitemap'"
              env:
                  INDEXNOW_KEY: "${{ secrets.INDEXNOW_KEY }}"
                  INDEXNOW_SITE_DIRECTORY: "docs/docusaurus"
              run: "node scripts/indexnow.mjs submit-sitemap"
